<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <title>语谱图显示水平轴为时间，垂直轴为频率，强度为颜色</title>
  <!-- 标题 -->
  <text x="250" y="20" text-anchor="middle" fill="#eee" font-size="16">语谱图 (Spectrogram)</text>
  <!-- 语谱图主体 -->
  <defs>
    <linearGradient id="spectrogramGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#008080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 语谱图矩形 -->
  <rect x="60" y="40" width="400" height="200" fill="url(#spectrogramGradient)" opacity="0.8"/>
  <!-- 网格线 -->
  <line x1="60" y1="90" x2="460" y2="90" stroke="#444" stroke-width="1"/>
  <line x1="60" y1="140" x2="460" y2="140" stroke="#444" stroke-width="1"/>
  <line x1="60" y1="190" x2="460" y2="190" stroke="#444" stroke-width="1"/>
  <line x1="160" y1="40" x2="160" y2="240" stroke="#444" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="240" stroke="#444" stroke-width="1"/>
  <line x1="360" y1="40" x2="360" y2="240" stroke="#444" stroke-width="1"/>
  <!-- 坐标轴 -->
  <line x1="60" y1="240" x2="460" y2="240" stroke="#666" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y2="240" stroke="#666" stroke-width="2"/>
  <!-- 轴标签 -->
  <text x="260" y="270" text-anchor="middle" fill="#aaa" font-size="12">时间 (t)</text>
  <text x="30" y="140" text-anchor="middle" fill="#aaa" font-size="12" transform="rotate(-90, 30, 140)">频率 (f)</text>
  <!-- 频率刻度 -->
  <text x="55" y="245" text-anchor="end" fill="#888" font-size="10">0 Hz</text>
  <text x="55" y="195" text-anchor="end" fill="#888" font-size="10">2 kHz</text>
  <text x="55" y="145" text-anchor="end" fill="#888" font-size="10">4 kHz</text>
  <text x="55" y="95" text-anchor="end" fill="#888" font-size="10">6 kHz</text>
  <text x="55" y="45" text-anchor="end" fill="#888" font-size="10">8 kHz</text>
  <!-- 时间刻度 -->
  <text x="60" y="255" text-anchor="middle" fill="#888" font-size="10">0s</text>
  <text x="160" y="255" text-anchor="middle" fill="#888" font-size="10">1s</text>
  <text x="260" y="255" text-anchor="middle" fill="#888" font-size="10">2s</text>
  <text x="360" y="255" text-anchor="middle" fill="#888" font-size="10">3s</text>
  <text x="460" y="255" text-anchor="middle" fill="#888" font-size="10">4s</text>
  <!-- 颜色条 -->
  <rect x="480" y="40" width="15" height="200" fill="url(#spectrogramGradient)"/>
  <text x="505" y="50" fill="#888" font-size="10">强</text>
  <text x="505" y="240" fill="#888" font-size="10">弱</text>
  <!-- 说明 -->
  <text x="250" y="295" text-anchor="middle" fill="#666" font-size="11">颜色强度 = 频谱能量</text>
</svg>
