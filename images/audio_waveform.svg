<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <title>标注了振幅、周期、频率和相移的正弦波</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <!-- 坐标轴 -->
  <line x1="40" y1="100" x2="380" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="40" y1="20" x2="40" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="385" y="105" fill="#666" font-size="12">时间 (t)</text>
  <text x="25" y="25" fill="#666" font-size="12">振幅 (A)</text>
  <!-- 正弦波 -->
  <path d="M 40 100 Q 60 40, 80 100 T 120 100 T 160 100 T 200 100 T 240 100 T 280 100 T 320 100 T 360 100"
        fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- 振幅标注 -->
  <line x1="70" y1="40" x2="70" y2="100" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="75" y="75" fill="#f87171" font-size="11">振幅 A</text>
  <!-- 周期标注 -->
  <line x1="80" y1="115" x2="120" y2="115" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="80" y1="110" x2="80" y2="120" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="120" y1="110" x2="120" y2="120" stroke="#4ade80" stroke-width="1.5"/>
  <text x="85" y="135" fill="#4ade80" font-size="11">周期 T = 1/f</text>
  <!-- 相位标注 -->
  <circle cx="40" cy="100" r="4" fill="#fbbf24"/>
  <text x="50" y="95" fill="#fbbf24" font-size="11">相位 φ</text>
  <!-- 公式 -->
  <text x="180" y="160" fill="#eee" font-size="14" font-style="italic">x(t) = A sin(2πft + φ)</text>
</svg>
