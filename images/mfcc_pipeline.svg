<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <title>MFCC 流水线</title>
  <text x="300" y="20" text-anchor="middle" fill="#eee" font-size="16">MFCC 特征提取流水线</text>
  <!-- 步骤 1: 原始音频 -->
  <rect x="10" y="40" width="80" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="50" y="65" text-anchor="middle" fill="#eee" font-size="10">原始音频</text>
  <path d="M 20 80 Q 25 70, 30 80 T 40 80 T 50 80 T 60 80 T 70 80" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <!-- 箭头 -->
  <line x1="95" y1="65" x2="115" y2="65" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 步骤 2: 分帧加窗 -->
  <rect x="120" y="40" width="80" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="160" y="60" text-anchor="middle" fill="#eee" font-size="10">分帧加窗</text>
  <text x="160" y="75" text-anchor="middle" fill="#aaa" font-size="9">25ms, 10ms 跳</text>
  <!-- 箭头 -->
  <line x1="205" y1="65" x2="225" y2="65" stroke="#666" stroke-width="2"/>
  <!-- 步骤 3: FFT -->
  <rect x="230" y="40" width="70" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="265" y="65" text-anchor="middle" fill="#eee" font-size="10">FFT</text>
  <!-- 箭头 -->
  <line x1="305" y1="65" x2="325" y2="65" stroke="#666" stroke-width="2"/>
  <!-- 步骤 4: Mel 滤波器组 -->
  <rect x="330" y="40" width="90" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="375" y="60" text-anchor="middle" fill="#eee" font-size="10">Mel 滤波</text>
  <text x="375" y="75" text-anchor="middle" fill="#aaa" font-size="9">40-80 个滤波器</text>
  <!-- 箭头 -->
  <line x1="425" y1="65" x2="445" y2="65" stroke="#666" stroke-width="2"/>
  <!-- 步骤 5: 对数 -->
  <rect x="450" y="40" width="60" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="480" y="65" text-anchor="middle" fill="#eee" font-size="10">log</text>
  <!-- 箭头 -->
  <line x1="515" y1="65" x2="535" y2="65" stroke="#666" stroke-width="2"/>
  <!-- 步骤 6: DCT -->
  <rect x="540" y="40" width="50" height="50" fill="#1e3a5f" stroke="#4A90D9" stroke-width="2"/>
  <text x="565" y="65" text-anchor="middle" fill="#eee" font-size="10">DCT</text>
  <!-- 输出 -->
  <line x1="595" y1="65" x2="615" y2="65" stroke="#666" stroke-width="2"/>
  <rect x="620" y="40" width="70" height="50" fill="#064e3b" stroke="#4ade80" stroke-width="2"/>
  <text x="655" y="60" text-anchor="middle" fill="#eee" font-size="10">MFCC</text>
  <text x="655" y="75" text-anchor="middle" fill="#4ade80" font-size="9">13 维</text>
  <!-- 下方说明 -->
  <rect x="10" y="110" width="580" height="200" fill="#16213e" opacity="0.5"/>
  <text x="300" y="130" text-anchor="middle" fill="#aaa" font-size="11">每帧处理流程</text>
  <!-- 可视化 Pipeline -->
  <text x="30" y="160" fill="#888" font-size="10">1. 原始波形</text>
  <path d="M 30 170 Q 35 160, 40 170 T 50 170 T 60 170 T 70 170 T 80 170" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="130" y="160" fill="#888" font-size="10">2. 分帧</text>
  <rect x="130" y="150" width="15" height="25" fill="#4A90D9" opacity="0.6"/>
  <rect x="150" y="150" width="15" height="25" fill="#4A90D9" opacity="0.4"/>
  <rect x="170" y="150" width="15" height="25" fill="#4A90D9" opacity="0.2"/>
  <text x="220" y="160" fill="#888" font-size="10">3. FFT 谱</text>
  <rect x="220" y="155" width="5" height="20" fill="#fbbf24"/>
  <rect x="230" y="150" width="5" height="25" fill="#fbbf24"/>
  <rect x="240" y="145" width="5" height="30" fill="#fbbf24"/>
  <rect x="250" y="155" width="5" height="20" fill="#fbbf24"/>
  <text x="300" y="160" fill="#888" font-size="10">4. Mel 能量</text>
  <path d="M 300 175 Q 310 150, 320 140 T 340 150 T 360 175" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="160" fill="#888" font-size="10">5. 对数压缩</text>
  <path d="M 400 175 Q 420 160, 440 145" fill="none" stroke="#a855f7" stroke-width="2"/>
  <text x="480" y="160" fill="#888" font-size="10">6. DCT → MFCC</text>
  <text x="480" y="180" fill="#4ade80" font-size="10">[0.5, -0.2, 0.1, ...]</text>
  <!-- 底部公式 -->
  <text x="300" y="220" text-anchor="middle" fill="#666" font-size="11">MFCC 捕获声道形状 (谱包络)，丢弃音高细节</text>
  <text x="300" y="245" text-anchor="middle" fill="#666" font-size="11">用于 GMM-HMM、DNN-HMM 等传统 ASR 系统</text>
  <text x="300" y="275" text-anchor="middle" fill="#888" font-size="10">现代深度学习模型直接使用对数 Mel 语谱图</text>
</svg>
