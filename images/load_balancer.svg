<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <title>负载均衡器</title>
  <rect width="400" height="200" fill="#16213e"/>
  <!-- 客户端 -->
  <rect x="10" y="80" width="60" height="40" fill="#4A90D9" rx="5"/>
  <text x="40" y="105" text-anchor="middle" fill="white" font-size="12">客户端</text>
  <!-- 负载均衡器 -->
  <circle cx="150" cy="100" r="30" fill="#f59e0b"/>
  <text x="150" y="95" text-anchor="middle" fill="white" font-size="11">负载</text>
  <text x="150" y="112" text-anchor="middle" fill="white" font-size="11">平衡器</text>
  <!-- 服务器 -->
  <rect x="250" y="40" width="70" height="35" fill="#10b981" rx="3"/>
  <text x="285" y="62" text-anchor="middle" fill="white" font-size="10">服务器 1</text>
  <rect x="250" y="82" width="70" height="35" fill="#10b981" rx="3"/>
  <text x="285" y="104" text-anchor="middle" fill="white" font-size="10">服务器 2</text>
  <rect x="250" y="125" width="70" height="35" fill="#10b981" rx="3"/>
  <text x="285" y="147" text-anchor="middle" fill="white" font-size="10">服务器 3</text>
  <!-- 箭头 -->
  <line x1="70" y1="100" x2="115" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="90" x2="245" y2="55" stroke="#666" stroke-width="1.5"/>
  <line x1="180" y1="100" x2="245" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="180" y1="110" x2="245" y2="145" stroke="#666" stroke-width="1.5"/>
  <text x="200" y="80" fill="#888" font-size="10">分发请求</text>
</svg>