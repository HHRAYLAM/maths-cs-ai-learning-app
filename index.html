<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <meta name="description" content="数学、计算机、AI 知识学习应用">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <!-- iOS 和移动端支持 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>数学/计算机/AI 学习</title>

  <!-- 基础路径：用于 GitHub Pages -->
  <base href="/maths-cs-ai-learning-app/">

  <!-- 样式 -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/theme-tom-jerry.css">
  <link rel="stylesheet" href="css/skill-tree.css">
  <link rel="stylesheet" href="css/lesson.css">
  <link rel="stylesheet" href="css/dependency.css">

  <!-- KaTeX 公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <!-- Marked Markdown 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/lib/marked.umd.js"></script>
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="top-nav">
    <h1 id="page-title"><span class="icon-house"></span>知识框架</h1>
    <div class="header-actions">
      <button id="search-btn" class="icon-btn" title="搜索">🔍</button>
      <button id="settings-btn" class="icon-btn" title="设置">⚙️</button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main id="app" class="main-content">
    <!-- 动态渲染内容 -->
  </main>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav">
    <a href="#dashboard" class="nav-item" data-page="dashboard">
      <span class="icon">🧀</span>
      <span class="label">概览</span>
    </a>
    <a href="#skill-tree" class="nav-item active" data-page="skill-tree">
      <span class="icon">🏠</span>
      <span class="label">知识树</span>
    </a>
    <a href="#dependency" class="nav-item" data-page="dependency">
      <span class="icon">🔗</span>
      <span class="label">依赖图</span>
    </a>
    <a href="#progress" class="nav-item" data-page="progress">
      <span class="icon">🐾</span>
      <span class="label">进度</span>
    </a>
  </nav>

  <!-- 课程阅读页面（全屏覆盖） -->
  <div id="lesson-viewer" class="lesson-viewer hidden">
    <div class="lesson-header">
      <button id="back-to-tree" class="back-btn">← 返回</button>
      <div class="lesson-nav">
        <button id="prev-lesson" class="nav-btn-with-label" disabled>
          <span class="nav-btn-icon">◀</span>
          <span class="nav-btn-label">上一课</span>
        </button>
        <button id="bookmark-btn" class="nav-btn" title="添加书签">⭐</button>
        <button id="feynman-btn" class="nav-btn" title="费曼模式">🎓</button>
        <button id="quiz-btn" class="nav-btn" title="练习题">📝</button>
        <button id="next-lesson" class="nav-btn-with-label">
          <span class="nav-btn-icon">▶</span>
          <span class="nav-btn-label">下一课</span>
        </button>
      </div>
    </div>
    <div class="lesson-content" id="lesson-content">
      <!-- Markdown 内容渲染于此 -->
    </div>
    <div class="lesson-footer">
      <button id="mark-complete" class="complete-btn">标记为完成</button>
    </div>

    <!-- 移动端底部导航 -->
    <div class="mobile-lesson-nav">
      <button id="mobile-prev" class="mobile-nav-btn prev" disabled>← 上一课</button>
      <button id="mobile-next" class="mobile-nav-btn next">下一课 →</button>
    </div>
  </div>

  <!-- 费曼模式弹窗 -->
  <div id="feynman-modal" class="modal hidden">
    <div class="modal-content feynman-modal-content">
      <h2>🎓 费曼学习法</h2>
      <div class="feynman-intro">
        <p>请用简单的语言解释这个概念，就像教给一个完全不懂的人：</p>
      </div>
      <textarea id="feynman-input" class="feynman-input" placeholder="1. 这个概念是什么？&#10;2. 它如何工作？&#10;3. 能举一个例子吗？&#10;&#10;试着用简单的语言和类比来解释..."></textarea>
      <div class="feynman-actions">
        <button id="feynman-save" class="btn btn-primary">保存解释</button>
        <button id="feynman-close" class="btn btn-secondary">关闭</button>
      </div>
      <div id="feynman-history" class="feynman-history">
        <h3>我的解释历史</h3>
        <div id="feynman-history-list"></div>
      </div>
    </div>
  </div>

  <!-- 练习模式弹窗 -->
  <div id="quiz-modal" class="modal hidden">
    <div class="modal-content quiz-modal-content">
      <h2 id="quiz-title">练习题</h2>
      <div id="quiz-container">
        <!-- 动态生成练习题 -->
      </div>
      <button class="modal-close" onclick="closeQuiz()">关闭</button>
    </div>
  </div>

  <!-- 内容包选择弹窗 -->
  <div id="content-pack-modal" class="modal hidden">
    <div class="modal-content">
      <h2>选择学习内容</h2>
      <div id="content-pack-list" class="pack-list">
        <!-- 动态生成 -->
      </div>
      <button class="modal-close" onclick="closeModal('content-pack-modal')">关闭</button>
    </div>
  </div>

  <!-- 搜索弹窗 -->
  <div id="search-modal" class="modal hidden">
    <div class="modal-content search-modal-content">
      <h2>搜索课程</h2>
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="搜索课程标题、概念、关键词...">
        <button id="search-close" class="search-close">✕</button>
      </div>
      <div id="search-results" class="search-results">
        <!-- 动态生成搜索结果 -->
      </div>
      <div id="search-hints" class="search-hints">
        <div class="hint-item">💡 支持搜索课程标题、概念名称</div>
        <div class="hint-item">💡 按 Enter 键快速搜索</div>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content settings-modal">
      <h2>⚙️ 设置</h2>

      <div class="settings-group">
        <div class="settings-item">
          <div class="settings-item-label">主题外观</div>
          <div class="theme-selector">
            <button class="theme-btn pill" data-theme="light">☀️ 浅色</button>
            <button class="theme-btn pill" data-theme="dark">🌙 暗色</button>
            <button class="theme-btn pill" data-theme="auto">🔄 系统</button>
          </div>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-item">
          <div class="settings-item-label">语言设置</div>
          <div class="language-selector segmented">
            <button class="language-btn segmented active" data-lang="zh-CN">🇨🇳 中文</button>
            <button class="language-btn segmented" data-lang="en-US">🇺🇸 English</button>
          </div>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-item">
          <div class="settings-item-label">学习内容</div>
          <button id="content-pack-btn" class="setting-btn secondary">📚 选择内容包 →</button>
        </div>
      </div>

      <div class="settings-group danger-zone">
        <div class="settings-item">
          <div class="settings-item-label">学习进度</div>
          <button id="reset-progress" class="setting-btn danger">⚠️ 重置所有进度</button>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-item">
          <div class="settings-item-label">关于</div>
          <p class="settings-description">基于 数学/CS/AI 知识大全 构建</p>
          <p class="settings-description version">版本 1.0.0</p>
        </div>
      </div>

      <button class="modal-close" onclick="closeModal('settings-modal')">完成</button>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast hidden"></div>

  <!-- 脚本 -->
  <script src="js/storage.js"></script>
  <script src="js/content.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/skill-tree.js"></script>
  <script src="js/dependency.js"></script>
  <script src="js/lesson.js"></script>
  <script src="js/app.js"></script>
  <script src="js/service-worker-register.js"></script>
  <script src="js/pwa-manager.js"></script>
</body>
</html>
